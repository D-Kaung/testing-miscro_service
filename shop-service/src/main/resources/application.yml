resilience4j:
  retry:
    instances:
      products-service:
        max-attempts: 2
        wait-duration: 3s
  circuitbreaker:
    instances:
      products-service:
        ignore-exceptions:
          - org.akh.microservice.shopservice.exception.ShopIdNotHaveException
        register-health-indicator: true
        sliding-window-size: 5
        minimum-number-of-calls: 3
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 2
        automatic-transition-from-open-to-half-open-enabled: true
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

  tracing:
    sampling:
      probability: 1.0

  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans
